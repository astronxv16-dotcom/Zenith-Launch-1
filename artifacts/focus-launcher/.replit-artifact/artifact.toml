kind = "web"
previewPath = "/"
title = "Focus Launcher"
version = "1.0.0"
id = "artifacts/focus-launcher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23266

[services.development]
run = "pnpm --filter @workspace/focus-launcher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/focus-launcher", "run", "build" ]
publicDir = "artifacts/focus-launcher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23266"
BASE_PATH = "/"
